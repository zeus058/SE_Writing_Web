# Cấu hình cụm hạ tầng phụ trợ cho môi trường phát triển Local
# Bao gồm: PostgreSQL (+ pgvector), Redis, RabbitMQ

services:
  # === CƠ SỞ DỮ LIỆU QUAN HỆ + VECTOR ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yag_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yag_admin
      POSTGRES_PASSWORD: yag_secret_2026
      POSTGRES_DB: yag_writing_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yag_admin -d yag_writing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === BỘ NHỚ ĐỆM & ĐẾM LƯỢT XEM TỐC ĐỘ CAO ===
  redis:
    image: redis:7-alpine
    container_name: yag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === HÀNG ĐỢI TÁC VỤ BẤT ĐỒNG BỘ (AI MODERATOR) ===
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yag_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # Cổng AMQP cho producer/consumer
      - "15672:15672" # Cổng giao diện quản trị RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: yag_mq
      RABBITMQ_DEFAULT_PASS: yag_mq_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
