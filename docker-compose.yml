version: '3.8'

services:
  # PostgreSQL Database Service with pgvector pre-installed
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yag_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yag_network

  # Redis Caching Service for Session, View Count, and WS Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: yag_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yag_network

  # RabbitMQ Message Broker for Async AI Moderation Pipeline
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yag_rabbitmq
    restart: always
    ports:
      - "5672:5672"     # AMQP Broker port
      - "15672:15672"   # Management Web Console port
    environment:
      RABBITMQ_DEFAULT_USER: yag_mq
      RABBITMQ_DEFAULT_PASS: yag_mq_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yag_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  yag_network:
    driver: bridge
