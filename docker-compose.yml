version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yag_user
      POSTGRES_PASSWORD: yag_secret
      POSTGRES_DB: yag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yag_user -d yag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: yag_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: yag_mq
      RABBITMQ_DEFAULT_PASS: yag_mq_secret
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: yag_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://yag_user:yag_secret@postgres:5432/yag_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://yag_mq:yag_mq_secret@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  moderation-worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: yag_moderation_worker
    restart: unless-stopped
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql://yag_user:yag_secret@postgres:5432/yag_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://yag_mq:yag_mq_secret@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: yag_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
