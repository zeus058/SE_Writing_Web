version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yag_user
      POSTGRES_PASSWORD: yag_secret
      POSTGRES_DB: yag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yag_user -d yag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: yag_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: yag_mq
      RABBITMQ_DEFAULT_PASS: yag_mq_secret
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: